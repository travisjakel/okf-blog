name: Publish blog

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: quarto-dev/quarto-actions/setup@v2
      # Posts use illustrative (non-executed) code blocks, so no R/Python setup
      # is needed here. If you later make chunks executable, add
      # r-lib/actions/setup-r + setup-python before the publish step.
      - name: Render & publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
